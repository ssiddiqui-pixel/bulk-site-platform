  <!-- right card -->
  <rect x="440" y="110" width="380" height="320" rx="16" fill="#1a1430" stroke="#2c2447"/>
  <text x="462" y="142" fill="#efeaff" font-size="13" font-weight="600">Progress</text>
  <g font-size="13">
    <g transform="translate(462,158)">
      <text x="0" y="14" fill="#efeaff">Echo Arcade</text>
      <rect x="270" y="0" width="66" height="20" rx="10" fill="rgba(49,196,141,.16)"/>
      <text x="303" y="14" fill="#31c48d" font-size="11" font-weight="700" text-anchor="middle">done</text>
    </g>
    <g transform="translate(462,190)">
      <text x="0" y="14" fill="#efeaff">Playwave Studio</text>
      <rect x="270" y="0" width="66" height="20" rx="10" fill="rgba(49,196,141,.16)"/>
      <text x="303" y="14" fill="#31c48d" font-size="11" font-weight="700" text-anchor="middle">done</text>
    </g>
    <g transform="translate(462,222)">
